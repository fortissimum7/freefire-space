<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Free Fire Space</title>

<link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://unpkg.com/mdui@2/mdui.global.js"></script>

<style>
*{box-sizing:border-box;font-family:'Roboto',sans-serif!important}

.material-icons-round{
  font-family:'Material Icons Round'!important;
  font-size:20px;
  display:flex;
  align-items:center;
}

body{
  margin:0;
  background:rgb(var(--mdui-color-surface));
  color:rgb(var(--mdui-color-on-surface));
}

.wrap{
  max-width:620px;
  margin:auto;
  padding:20px 16px 80px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.section-label{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  color:rgb(var(--mdui-color-on-surface-variant));
}

.warn-box{
  display:none;
  background:rgb(var(--mdui-color-error-container));
  color:rgb(var(--mdui-color-on-error-container));
  border-radius:10px;
  padding:10px;
  font-size:13px;
}

.output-card{
  background:rgb(var(--mdui-color-surface-container));
  border-radius:16px;
  overflow:hidden;
}

.output-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px 10px;
}

.output-title{
  font-size:13px;
  font-weight:600;
  text-transform:uppercase;
  color:rgb(var(--mdui-color-on-surface-variant));
}

.output-body{
  padding:8px 16px 18px;
  font-family:'Roboto Mono',monospace!important;
  word-break:break-all;
  min-height:60px;
}

.output-body.empty{
  font-family:'Roboto',sans-serif!important;
  font-style:italic;
  color:rgb(var(--mdui-color-on-surface-variant));
}

.stats-row{
  display:flex;
  justify-content:flex-start;
  gap:8px;
  padding:8px 16px 12px;
  border-top:1px solid rgb(var(--mdui-color-outline-variant));
}

.stat-pill{
  background:rgb(var(--mdui-color-surface));
  padding:4px 10px;
  border-radius:8px;
  font-size:12px;
  display:flex;
  gap:4px;
  align-items:center;
}

.stat-pill b{
  color:rgb(var(--mdui-color-primary));
}

.stat-pill.danger{
  background:rgb(var(--mdui-color-error-container));
  color:rgb(var(--mdui-color-on-error-container));
  font-weight:600;
}

.topbar-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}

.chip-fix{
  display:flex;
  align-items:center;
  gap:6px;
}

.footer{
  position:fixed;
  bottom:12px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:16px;
  opacity:.85;
}

.footer a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:28px;
}

.footer svg{
  width:22px;
  height:22px;
  fill:currentColor;
  transition:.2s;
}

.footer a:hover svg{
  transform:scale(1.15);
  opacity:.7;
}
</style>
</head>
<body>

<mdui-top-app-bar scroll-behavior="elevate">
  <div class="topbar-inner">
    <mdui-top-app-bar-title>Free Fire Space</mdui-top-app-bar-title>

    <mdui-dropdown placement="bottom-end">
      <mdui-chip slot="trigger" class="chip-fix">
        <span id="chip-text">U+00A0</span>
        <span class="material-icons-round">arrow_drop_down</span>
      </mdui-chip>

      <mdui-menu id="space-menu" selects="single" value="00A0">
        <mdui-menu-item value="00A0">Non-Breaking Space</mdui-menu-item>
        <mdui-menu-item value="2006">Six-Per-Em</mdui-menu-item>
        <mdui-menu-item value="2005">Four-Per-Em</mdui-menu-item>
        <mdui-menu-item value="2004">Three-Per-Em</mdui-menu-item>
        <mdui-menu-item value="2003">Em Space</mdui-menu-item>
      </mdui-menu>
    </mdui-dropdown>
  </div>
</mdui-top-app-bar>

<div class="wrap">

<div class="section-label">Nickname</div>

<mdui-text-field id="input" variant="outlined"
  label="Your nickname"
  placeholder="e.g. whole lotta red">
</mdui-text-field>

<div class="warn-box" id="warn">
  <span class="material-icons-round">warning</span>
  No spaces found!
</div>

<div class="output-card">
  <div class="output-header">
    <span class="output-title">Result</span>
    <mdui-button-icon id="btn-copy">
      <span class="material-icons-round">content_copy</span>
    </mdui-button-icon>
  </div>

  <div class="output-body empty" id="output">Empty</div>

  <div class="stats-row" id="stats" style="display:none">
    <div class="stat-pill" id="len-pill">
      <span class="material-icons-round">straighten</span>
      <b id="s-len">0</b> characters
    </div>
    <div class="stat-pill">
      <span class="material-icons-round">space_bar</span>
      <b id="s-sp">0</b> spaces
    </div>
    <div class="stat-pill" id="s-type">
      <span class="material-icons-round">code</span>
      U+00A0
    </div>
  </div>
</div>

</div>

<div class="footer">
  <a href="https://github.com/fortissimum7" target="_blank">
    <svg viewBox="0 0 24 24">
      <path d="M12 .5C5.73.5.98 5.25.98 11.52c0 4.97 3.22 9.19 7.68 10.68.56.1.77-.24.77-.54 0-.27-.01-1.16-.02-2.1-3.13.68-3.79-1.51-3.79-1.51-.51-1.3-1.24-1.65-1.24-1.65-1.01-.69.08-.68.08-.68 1.12.08 1.7 1.15 1.7 1.15.99 1.7 2.6 1.21 3.24.93.1-.72.39-1.21.71-1.49-2.5-.28-5.13-1.25-5.13-5.55 0-1.23.44-2.24 1.15-3.03-.12-.28-.5-1.42.11-2.95 0 0 .94-.3 3.08 1.15a10.7 10.7 0 0 1 2.8-.38c.95 0 1.91.13 2.8.38 2.14-1.45 3.08-1.15 3.08-1.15.61 1.53.23 2.67.11 2.95.71.79 1.15 1.8 1.15 3.03 0 4.31-2.63 5.26-5.14 5.54.4.35.75 1.04.75 2.1 0 1.52-.01 2.74-.01 3.11 0 .3.2.65.78.54a11.04 11.04 0 0 0 7.67-10.68C23.02 5.25 18.27.5 12 .5z"/>
    </svg>
  </a>

  <a href="https://t.me/s4mpdor" target="_blank">
    <svg viewBox="0 0 24 24">
      <path d="M9.04 15.47 8.9 20.5c.42 0 .6-.18.82-.4l1.97-1.88 4.09 3c.75.42 1.28.2 1.48-.7l2.68-12.57c.25-1.16-.42-1.62-1.14-1.35L1.57 9.7c-1.13.44-1.11 1.07-.2 1.35l4.62 1.44 10.74-6.77c.5-.3.95-.13.57.18"/>
    </svg>
  </a>
</div>

<script>
const SPACES={
 '00A0':'\u00A0',
 '2006':'\u2006',
 '2005':'\u2005',
 '2004':'\u2004',
 '2003':'\u2003'
};

const LABELS={
 '00A0':'U+00A0',
 '2006':'U+2006',
 '2005':'U+2005',
 '2004':'U+2004',
 '2003':'U+2003'
};

const inputEl=document.getElementById('input');
const outputEl=document.getElementById('output');
const warnEl=document.getElementById('warn');
const menuEl=document.getElementById('space-menu');
const chipText=document.getElementById('chip-text');
const lenEl=document.getElementById('s-len');
const lenPill=document.getElementById('len-pill');

menuEl.addEventListener('change',()=>{
 chipText.textContent='U+'+menuEl.value.toUpperCase();
 update();
});

function update(){
 const val=inputEl.value;

 if(!val){
  outputEl.textContent='Empty';
  outputEl.classList.add('empty');
  document.getElementById('stats').style.display='none';
  return;
 }

 const count=(val.match(/ /g)||[]).length;

 if(!count){
  warnEl.style.display='flex';
  outputEl.textContent=val;
  outputEl.classList.remove('empty');
  return;
 }

 warnEl.style.display='none';

 const result=val.split(' ').join(SPACES[menuEl.value]);

 outputEl.textContent=result;
 outputEl.classList.remove('empty');

 const len=result.length;
 lenEl.textContent=len;

 document.getElementById('s-sp').textContent=count;
 document.getElementById('s-type').innerHTML =
  '<span class="material-icons-round">code</span> '+LABELS[menuEl.value];

 document.getElementById('stats').style.display='flex';

 if(len>12){
  lenPill.classList.add('danger');
 }else{
  lenPill.classList.remove('danger');
 }
}

inputEl.addEventListener('input',update);

document.getElementById('btn-copy').onclick=async()=>{
 if(outputEl.classList.contains('empty')) return;
 await navigator.clipboard.writeText(outputEl.textContent);
 mdui.snackbar({message:'Copied'});
};
</script>

</body>
</html>
